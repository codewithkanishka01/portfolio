<!DOCTYPE html>
<html>
<head>
<style>
  .carousel-wrapper { width: 500px; border: 2px solid red; overflow: hidden; position: relative; height: 100px; }
  .carousel-track { display: flex; transition: transform 0.5s; width: 100%; border: 2px solid blue;}
  .carousel-slide { min-width: 100%; flex-shrink: 0; background: rgba(0,255,0,0.3); }
</style>
</head>
<body>
  <div class="carousel-wrapper">
    <div class="carousel-track" style="transform: translateX(-100%);" id="track">
      <div class="carousel-slide">1</div>
      <div class="carousel-slide">2</div>
      <div class="carousel-slide">3</div>
    </div>
  </div>
</body>
</html>
